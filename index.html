<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duke Sports TV Manager</title>
  <style>
    body{margin:0;background:#111;color:white;font-family:Arial,sans-serif}
    button{padding:10px 14px;margin:5px;border:none;background:#1e88e5;color:white;border-radius:6px;cursor:pointer}
    button:hover{background:#1565c0}
    .header{display:flex;align-items:center;gap:15px;padding:10px 16px;background:#000}
    .header img{height:60px;border-radius:50%}

    .board{font-size:22px;background:#222;padding:20px;border-radius:8px}
    .match{margin-bottom:15px;padding:10px;background:#222;border-radius:6px}
    iframe{border:none;border-radius:8px;background:#fff}
